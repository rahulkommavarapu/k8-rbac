# This is the Role

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: default-trainee
rules:
  - apiGroups: [""] # "" indicates the core API group  here given all Access for own Project
    resources: ["pods"]
    verbs: ["get", "watch", "list"]
---
# Her Role BindingapiVersion: rbac.authorization.k8s.io/v1
# This role binding allows "jane" to read pods in the "default" namespace.
# You need to already have a Role named "pod-reader" in that namespace.
kind: RoleBinding
metadata:
  name:  default-trainee
  namespace: default
subjects:
# You can specify more than one "subject"
- kind: User
  name: Rahul # "name" is case sensitive
  apiGroup: rbac.authorization.k8s.io
roleRef:
  # "roleRef" specifies the binding to a Role / ClusterRole
  kind: Role #this must be Role or ClusterRole
  name:   default-trainee # this must match the name of the Role or ClusterRole you wish to bind to
  apiGroup: rbac.authorization.k8s.io

